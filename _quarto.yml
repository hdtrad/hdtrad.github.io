project:
  type: website
  output-dir: _site
  resources:
    - "assets/**"
    - "CNAME"
    - "robots.txt"

website:
  title: "Hugo Trad"
  description: "Behavioural scientist, Africa Business School (UM6P). Cognitive psychology of administrative complexity."
  site-url: https://hdtrad.github.io
  repo-url: https://github.com/hdtrad/hdtrad.github.io
  favicon: assets/favicon.svg
  open-graph: true
  twitter-card: true
  page-navigation: false
  back-to-top-navigation: false

  navbar:
    pinned: false
    background: light
    foreground: dark
    logo: false
    title: false
    left:
      - text: "Hugo Trad"
        href: en/index.qmd
        aria-label: "Home"
    right:
      - text: "EN"
        href: en/index.qmd
      - text: "FR"
        href: fr/index.qmd
      - text: "AR"
        href: ar/index.qmd
      - icon: github
        href: https://github.com/hdtrad
        aria-label: "GitHub"
      - icon: envelope
        href: "mailto:hugo.trad@um6p.ma"
        aria-label: "Email"

  page-footer:
    background: light
    left: |
      © Hugo Trad · Built with [Quarto](https://quarto.org)
    right: |
      *Outside the lab: sport, music, hiking the Atlas.*

format:
  html:
    theme:
      light: [cosmo, styles/custom.scss]
      dark: [cosmo, styles/custom.scss, styles/dark.scss]
    css: styles/extra.css
    toc: false
    anchor-sections: false
    smooth-scroll: true
    code-copy: false
    link-external-newwindow: true
    link-external-icon: false
    fig-align: center
    include-in-header:
      - _includes/head-meta.html
    include-after-body:
      - _includes/lang-redirect.html

execute:
  freeze: auto
