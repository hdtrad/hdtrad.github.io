project:
  type: website
  output-dir: _site
  resources:
    - "assets/**"
    - "robots.txt"

website:
  title: "Hugo Trad"
  description: "Behavioural scientist, Africa Business School (UM6P). Cognitive psychology of administrative complexity."
  site-url: https://hdtrad.github.io
  repo-url: https://github.com/hdtrad/hdtrad.github.io
  favicon: assets/favicon.svg
  open-graph: true
  twitter-card: true
  page-navigation: false
  back-to-top-navigation: false

format:
  html:
    theme:
      - cosmo
      - styles/custom.scss
    css: styles/extra.css
    toc: false
    anchor-sections: false
    smooth-scroll: true
    code-copy: false
    link-external-newwindow: true
    link-external-icon: false
    fig-align: center
    include-in-header:
      - _includes/head-meta.html
    include-after-body:
      - _includes/lang-redirect.html

execute:
  freeze: auto
