<script>
// Mark active language link in navbar based on URL prefix
(function () {
  const path = window.location.pathname;
  let activeLang = null;
  if (path.includes('/en/')) activeLang = 'EN';
  else if (path.includes('/fr/')) activeLang = 'FR';
  else if (path.includes('/ar/')) activeLang = 'AR';

  if (activeLang) {
    const links = document.querySelectorAll('.navbar .nav-link');
    links.forEach(l => {
      if (l.textContent.trim() === activeLang) {
        l.classList.add('active-lang');
      }
    });
  }

  // Set <html lang> + <html dir> based on URL prefix (Quarto sets globally; we override per-page)
  const html = document.documentElement;
  if (path.includes('/ar/')) {
    html.setAttribute('lang', 'ar');
    html.setAttribute('dir', 'rtl');
  } else if (path.includes('/fr/')) {
    html.setAttribute('lang', 'fr');
    html.setAttribute('dir', 'ltr');
  } else {
    html.setAttribute('lang', 'en');
    html.setAttribute('dir', 'ltr');
  }
})();
</script>
